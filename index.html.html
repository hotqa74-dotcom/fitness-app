<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #020617; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .tab-active { color: #22d3ee; border-top: 2px solid #22d3ee; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // רכיב אייקון פשוט כי אנחנו טוענים lucide חיצונית
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [currentView, setCurrentView] = useState('dashboard');
            const [history, setHistory] = useState([
                { date: '22/04/2026', type: 'אימון A', duration: '55 דק\'' },
                { date: '20/04/2026', type: 'אימון B', duration: '62 דק\'' }
            ]);

            return (
                <div className="flex flex-col min-h-screen max-w-md mx-auto bg-slate-950 pb-24">
                    {/* Header */}
                    <header className="p-6 pt-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black tracking-tighter text-white">היי אריאל 👋</h1>
                            <p className="text-slate-500 text-sm">מוכן לשבור שיאים היום?</p>
                        </div>
                        <div className="bg-slate-800 p-2 rounded-full border border-slate-700">
                            <LucideIcon name="dumbbell" className="text-cyan-400" />
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 px-6 overflow-y-auto no-scrollbar">
                        
                        {currentView === 'dashboard' && (
                            <div className="animate-up space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-900 p-4 rounded-3xl border border-slate-800">
                                        <LucideIcon name="flame" className="text-orange-500 mb-2" />
                                        <div className="text-2xl font-bold">1,240</div>
                                        <div className="text-slate-500 text-xs">קלוריות השבוע</div>
                                    </div>
                                    <div className="bg-slate-900 p-4 rounded-3xl border border-slate-800">
                                        <LucideIcon name="timer" className="text-cyan-500 mb-2" />
                                        <div className="text-2xl font-bold">4</div>
                                        <div className="text-slate-500 text-xs">אימונים החודש</div>
                                    </div>
                                </div>

                                <h3 className="text-lg font-bold text-right">בחר אימון</h3>
                                <div className="space-y-3">
                                    {['A', 'B', 'C'].map((type) => (
                                        <button key={type} className="w-full bg-gradient-to-l from-slate-800 to-slate-900 p-5 rounded-2xl border border-slate-800 flex justify-between items-center hover:border-cyan-500 transition-all">
                                            <LucideIcon name="play-circle" className="text-cyan-400" />
                                            <div className="text-right">
                                                <div className="font-bold">אימון {type}</div>
                                                <div className="text-slate-400 text-xs">גב, כתפיים ויד אחורית</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentView === 'history' && (
                            <div className="animate-up space-y-4">
                                <h3 className="text-xl font-bold text-right mb-4">היסטוריית אימונים</h3>
                                {history.map((item, index) => (
                                    <div key={index} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                                        <div className="text-cyan-400 font-medium">{item.duration}</div>
                                        <div className="text-right">
                                            <div className="font-bold">{item.type}</div>
                                            <div className="text-slate-500 text-xs">{item.date}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {currentView === 'journal' && (
                            <div className="animate-up text-center py-20">
                                <LucideIcon name="calendar-days" size={48} className="mx-auto text-slate-700 mb-4" />
                                <h3 className="text-xl font-bold">יומן אימונים</h3>
                                <p className="text-slate-500 mt-2 text-sm px-10">כאן תוכל לתזמן את האימונים הבאים שלך ולראות רצף ביצועים.</p>
                                <button className="mt-6 bg-cyan-500 text-slate-950 px-6 py-2 rounded-full font-bold">הוסף יעד חדש</button>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/80 backdrop-blur-xl border-t border-slate-800 px-8 py-4 flex justify-between items-center rounded-t-3xl">
                        <button onClick={() => setCurrentView('history')} className={`flex flex-col items-center gap-1 ${currentView === 'history' ? 'text-cyan-400' : 'text-slate-500'}`}>
                            <LucideIcon name="history" />
                            <span className="text-[10px] font-bold">היסטוריה</span>
                        </button>
                        
                        <button onClick={() => setCurrentView('dashboard')} className="relative -top-8 bg-cyan-500 p-4 rounded-2xl shadow-xl shadow-cyan-500/20 rotate-45 border-4 border-slate-950">
                            <div className="-rotate-45">
                                <LucideIcon name="layout-dashboard" className="text-slate-950" />
                            </div>
                        </button>

                        <button onClick={() => setCurrentView('journal')} className={`flex flex-col items-center gap-1 ${currentView === 'journal' ? 'text-cyan-400' : 'text-slate-500'}`}>
                            <LucideIcon name="calendar-days" />
                            <span className="text-[10px] font-bold">יומן</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
